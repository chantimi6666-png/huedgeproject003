  <!DOCTYPE html>                                                             
  <html lang="zh-CN">                                                         
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>诚心礼佛 - 祈愿平安</title>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@
  400;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font
  -awesome/6.4.0/css/all.min.css">
      <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }

          body, html {
              height: 100%;
              font-family: 'Noto Serif SC', serif;
              overflow: hidden; /* 禁止滚动 */
          }

          :root {
              --gold: #d4af37;
              --red: #b71c1c;
              --bg: #fff8e1;
          }

          /* 背景：全屏大图，带淡入效果 */
          .main-container {
              height: 100vh;
              display: flex;
              align-items: center;
              justify-content: center;
              background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0,
  0.4)),
                          url('https://images.unsplash.com/photo-1528662096024
  -5dc5a6230cc3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
              background-size: cover;
              background-position: center;
              color: #fff;
              text-align: center;
          }

          /* 居中内容框 */
          .content-box {
              background: rgba(0, 0, 0, 0.5);
              padding: 3rem;
              border: 2px solid var(--gold);
              backdrop-filter: blur(5px);
              max-width: 600px;
              width: 90%;
              border-radius: 4px;
              animation: fadeIn 2s ease-out;
          }

          .icon {
              font-size: 3rem;
              color: var(--gold);
              margin-bottom: 1rem;
          }

          h1 {
              font-size: 2.5rem;
              letter-spacing: 5px;
              margin-bottom: 1.5rem;
              font-weight: 700;
          }

          .line {
              width: 50px;
              height: 2px;
              background: var(--gold);
              margin: 0 auto 1.5rem;
          }

          p {
              font-size: 1.2rem;
              line-height: 2;
              margin-bottom: 2rem;
              font-weight: 300;
          }

          .btn {
              display: inline-block;
              color: #333;
              background: var(--gold);
              padding: 0.8rem 3rem;
              text-decoration: none;
              font-weight: 600;
              border-radius: 2px;
              transition: 0.3s;
              letter-spacing: 2px;
          }

          .btn:hover {
              background: #fff;
              transform: scale(1.05);
          }

          .footer-note {
              position: absolute;
              bottom: 20px;
              width: 100%;
              font-size: 0.9rem;
              color: rgba(255, 255, 255, 0.6);
              letter-spacing: 1px;
          }

          @keyframes fadeIn {
              from { opacity: 0; transform: translateY(20px); }
              to { opacity: 1; transform: translateY(0); }
          }
      </style>
  </head>
  <body>

      <div class="main-container">
          <div class="content-box">
              <div class="icon">
                  <i class="fas fa-pray"></i>
              </div>
              <h1>诚心祈愿</h1>
              <div class="line"></div>
              <p>
                  心静则智生，心善则福延。<br>
                  在这一份宁静中，点燃内心的智慧明灯，<br>
                  祈愿众生安康，万事顺遂。
              </p>
              <a href="#" class="btn">恭请礼赞</a>
          </div>
      </div>

      <div class="footer-note">
          愿以此功德 · 普及于一切
      </div>

  </body>
  </html>
